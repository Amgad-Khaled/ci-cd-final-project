apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: cd-pipeline
spec:
  workspaces:
    - name: output
  params:
    - name: app-name
      type: string
      default: my-app
    - name: build-image
      type: string
      default: my-app-image:latest
  tasks:
    - name: cleanup
      taskRef:
        name: cleanup
      workspaces:
        - name: source
          workspace: output

    - name: git-clone
      runAfter:
        - cleanup
      taskRef:
        name: git-clone
      params:
        - name: url
          value: https://github.com/<your-username>/<your-repo>.git
        - name: revision
          value: main
      workspaces:
        - name: output
          workspace: output

    - name: lint
      runAfter:
        - git-clone
      taskRef:
        name: flake8
      workspaces:
        - name: source
          workspace: output

    - name: run-tests
      runAfter:
        - lint
      taskRef:
        name: nose
      workspaces:
        - name: source
          workspace: output
      params:
        - name: args
          value: "-v --with-spec --spec-color --with-coverage --cover-package=app"

    - name: build
      runAfter:
        - run-tests
      taskRef:
        name: buildah
      workspaces:
        - name: source
          workspace: output
      params:
        - name: IMAGE
          value: $(params.build-image)

    - name: deploy
      runAfter:
        - build
      taskRef:
        name: openshift-client
      workspaces:
        - name: source
          workspace: output
      params:
        - name: SCRIPT
          value: |
            oc create deployment $(params.app-name) --image=$(params.build-image) --dry-run=client -o yaml | oc apply -f -
